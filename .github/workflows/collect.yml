name: hourly-portfolio-snapshot

on:
  schedule:
    # Every 30 minutes (at :07 and :37). GitHub aggressively throttles scheduled
    # workflows on free tier; doubling the rate compensates for skipped runs while
    # staying well under the 2,000 min/mo private-repo quota (~44 min/month total).
    - cron: "7,37 * * * *"
  workflow_dispatch: {}    # allow manual trigger from the Actions tab

# Required for the workflow to commit the updated parquet back to the repo
permissions:
  contents: write

concurrency:
  group: portfolio-snapshot
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 18    # 794 wallets * ~0.7s/call = ~9-10 min, plus overhead
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install --quiet -r requirements.txt

      - name: Run collector
        id: collect
        run: python collector.py
        # If the script exits non-zero, the workflow fails and GitHub emails the repo owner.

      - name: Commit & push if data changed
        run: |
          git config user.name  "hl-collector[bot]"
          git config user.email "hl-collector[bot]@users.noreply.github.com"
          git add data/portfolios.parquet data/wallets.json data/status.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          # Use the run number + UTC time in commit message so monitoring is easy
          git commit -m "snapshot: run #${{ github.run_number }} @ $(date -u +%Y-%m-%dT%H:%MZ)"
          # Race-safe push: the whale-watcher workflow commits to the same branch
          # on a tighter cadence. If our push is rejected as non-fast-forward,
          # rebase onto the latest origin/main and retry. Disjoint file sets
          # (portfolio writes portfolios.parquet/wallets.json/status.json; whale
          # writes whale12_*.{parquet,json}) → rebase is always a clean fast-forward.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "push ok on attempt $attempt"
              exit 0
            fi
            echo "push rejected (attempt $attempt) — rebasing onto origin/main and retrying"
            git pull --rebase --autostash origin main
            sleep $((attempt * 2))
          done
          echo "push still failing after 5 attempts — giving up"
          exit 1

      - name: Optional Discord alert on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK }}" ]; then
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"content\":\"❌ HL collector failed: run #${{ github.run_number }} — see https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "${{ secrets.DISCORD_WEBHOOK }}"
          fi
